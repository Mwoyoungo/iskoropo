<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Iskropo – On It</title>

<!-- Fonts — display:swap so text shows immediately -->
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800;900&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet"/>

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
/* ── Reset ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%; overflow: hidden;
  background: #F9F7F5;
  font-family: 'Manrope', system-ui, sans-serif;
  -webkit-tap-highlight-color: transparent;
}

/* ── Map ── */
#map {
  position: fixed; inset: 0; z-index: 0;
  background: #e8e4de; /* fallback while tiles load */
}
.leaflet-control-zoom,
.leaflet-control-attribution { display: none !important; }
/* desaturate tiles once Leaflet loads */
.leaflet-layer { filter: saturate(0.2) brightness(1.08) contrast(0.88); }

/* ── Top bar — visible immediately, no JS needed ── */
#topbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 200;
  height: 58px;
  display: flex; align-items: center; justify-content: center;
  background: rgba(255,255,255,0.82);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  box-shadow: 0 1px 0 rgba(0,0,0,0.06);
}
#back-btn {
  position: absolute; left: 14px;
  width: 40px; height: 40px; border-radius: 50%;
  background: rgba(247,118,34,0.10);
  border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.12s;
}
#back-btn:active { transform: scale(0.9); }
#back-btn svg { width: 18px; height: 18px; stroke: #F77622; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
#wordmark {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-weight: 900; font-size: 20px;
  color: #181C27; letter-spacing: -0.5px;
}
#wordmark em { color: #F77622; font-style: normal; }

/* ── Bottom sheet — VISIBLE BY DEFAULT, no JS needed ── */
#sheet {
  position: fixed;
  bottom: 0; left: 0; right: 0; z-index: 100;
  height: 72vh;
  background: rgba(255,255,255,0.94);
  backdrop-filter: blur(28px);
  -webkit-backdrop-filter: blur(28px);
  border-radius: 36px 36px 0 0;
  box-shadow: 0 -12px 60px rgba(0,0,0,0.10);
  display: flex; flex-direction: column;
  /* slide in on load */
  animation: sheet-in 0.5s cubic-bezier(0.16,1,0.3,1) both;
}
@keyframes sheet-in {
  from { transform: translateY(60px); opacity: 0; }
  to   { transform: translateY(0);    opacity: 1; }
}

/* pull handle */
.handle {
  width: 40px; height: 4px; border-radius: 99px;
  background: #DDD4CA; margin: 12px auto 0; flex-shrink: 0;
}

/* scrollable body */
#scroll {
  flex: 1; overflow-y: auto; padding: 18px 22px 130px;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
#scroll::-webkit-scrollbar { display: none; }

/* ── Headline ── */
#hl-main {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-weight: 900; font-size: 30px; line-height: 1.1;
  color: #181C27; letter-spacing: -0.5px;
}
#hl-sub {
  font-size: 14px; color: #8A6A55; font-weight: 500;
  margin-top: 5px; min-height: 20px;
  transition: color 0.3s;
}

/* ── Query box ── */
#query-wrap {
  margin-top: 18px;
  opacity: 0;
  animation: none;
}
#query-wrap.show {
  animation: fade-up 0.35s ease both;
}
@keyframes fade-up {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}
#query-display {
  background: #F2EDE8; border-radius: 14px;
  padding: 13px 16px;
  display: flex; align-items: flex-start; gap: 10px;
  min-height: 48px;
}
#query-display svg { width: 18px; height: 18px; flex-shrink: 0; margin-top: 1px; }
#typewriter-text {
  font-size: 14px; font-weight: 600; color: #181C27;
  line-height: 1.5; flex: 1;
}
.cursor {
  display: inline-block; width: 2px; height: 1em;
  background: #F77622; vertical-align: text-bottom;
  animation: blink 0.7s step-end infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

/* ── Section label ── */
.section-label {
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: #8A6A55; margin: 20px 0 10px;
  opacity: 0; transition: opacity 0.3s;
}
.section-label.show { opacity: 1; }

/* ── Chips ── */
#chips { display: flex; flex-wrap: wrap; gap: 8px; }
.chip {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 14px; border-radius: 99px;
  font-size: 13px; font-weight: 700;
  opacity: 0; transform: translateX(-16px);
  transition: opacity 0.3s ease, transform 0.3s ease;
}
.chip.show { opacity: 1; transform: translateX(0); }
.chip svg { width: 14px; height: 14px; flex-shrink: 0; }
.chip-svc { background: linear-gradient(135deg,#9D4300,#F77622); color: #fff; }
.chip-other { background: #F2EDE8; color: #584237; }

/* ── Refine rows ── */
#refine-wrap {
  opacity: 0; transform: translateY(8px);
  transition: opacity 0.35s ease, transform 0.35s ease;
}
#refine-wrap.show { opacity: 1; transform: translateY(0); }
.refine-row {
  display: flex; align-items: center; gap: 12px;
  background: #F2EDE8; border-radius: 14px;
  padding: 13px 14px; margin-bottom: 8px;
  cursor: pointer; border: none; width: 100%; text-align: left;
  transition: transform 0.12s, background 0.15s;
}
.refine-row:active { transform: scale(0.98); background: #E8E0D8; }
.refine-icon {
  width: 36px; height: 36px; border-radius: 10px; flex-shrink: 0;
  background: rgba(247,118,34,0.12);
  display: flex; align-items: center; justify-content: center;
}
.refine-icon svg { width: 17px; height: 17px; stroke: #F77622; fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
.refine-body { flex: 1; }
.refine-body strong { display: block; font-size: 13px; font-weight: 700; color: #181C27; }
.refine-body span   { font-size: 11px; color: #8A6A55; }
.refine-chevron { width: 14px; height: 14px; stroke: #DDD4CA; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }

/* ── Loading bar ── */
#loading-wrap {
  margin-top: 20px;
  opacity: 0; transform: translateY(6px);
  transition: opacity 0.35s ease, transform 0.35s ease;
}
#loading-wrap.show { opacity: 1; transform: translateY(0); }
#bar-track {
  height: 6px; border-radius: 99px;
  background: #E8E0D8; overflow: hidden; margin-bottom: 9px;
}
#bar-fill {
  height: 100%; border-radius: 99px; width: 0%;
  background: linear-gradient(90deg,#9D4300,#F77622,#FE7B27);
  transition: width 1.2s cubic-bezier(0.4,0,0.2,1);
}
#bar-fill.shimmer {
  width: 35%;
  background: linear-gradient(90deg,#9D4300 0%,#F77622 50%,#FE7B27 100%);
  background-size: 200% 100%;
  animation: shimmer 1.6s linear infinite;
}
@keyframes shimmer {
  0%   { background-position: -200% 0; }
  100% { background-position:  200% 0; }
}
#bar-text {
  font-size: 12px; font-weight: 600; color: #8A6A55;
  display: flex; align-items: center; gap: 5px;
}
#bar-text svg { width: 13px; height: 13px; }
#bar-text.found { color: #2e7d52; }

/* ── Sticky bottom ── */
#actions {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 14px 22px 32px;
  background: linear-gradient(to top, rgba(255,255,255,1) 60%, rgba(255,255,255,0));
}
#btn-continue {
  width: 100%; height: 52px; border-radius: 99px;
  background: linear-gradient(135deg,#9D4300,#F77622,#FE7B27);
  color: #fff; border: none; cursor: pointer;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-weight: 800; font-size: 15px; letter-spacing: -0.2px;
  display: flex; align-items: center; justify-content: center; gap: 6px;
  box-shadow: 0 6px 24px rgba(247,118,34,0.32);
  transition: transform 0.12s, box-shadow 0.12s;
}
#btn-continue:active { transform: scale(0.97); }
#btn-continue.glow {
  animation: glow-pulse 1.1s ease-in-out infinite;
}
@keyframes glow-pulse {
  0%,100% { box-shadow: 0 6px 24px rgba(247,118,34,0.32); }
  50%      { box-shadow: 0 8px 40px rgba(247,118,34,0.6), 0 0 0 8px rgba(247,118,34,0.10); }
}
#btn-browse {
  display: block; width: 100%; background: none; border: none;
  padding: 10px; text-align: center; cursor: pointer;
  font-size: 13px; font-weight: 600; color: #8A6A55;
  transition: color 0.15s;
}
#btn-browse:hover { color: #181C27; }

/* ── User dot ── */
.u-wrap { position: relative; width: 44px; height: 44px; display:flex; align-items:center; justify-content:center; }
.u-ring  { position:absolute; inset:0; border-radius:50%; background:rgba(247,118,34,0.22); animation:u-pulse 2s ease-out infinite; }
.u-dot   { width:14px; height:14px; border-radius:50%; background:#F77622; border:3px solid #fff; box-shadow:0 2px 8px rgba(247,118,34,0.5); position:relative; z-index:1; }
@keyframes u-pulse { 0%{transform:scale(.6);opacity:.7} 100%{transform:scale(2.4);opacity:0} }

/* ── Provider dot ── */
.p-dot { width:9px; height:9px; border-radius:50%; background:#9D4300; border:2px solid #fff; box-shadow:0 1px 4px rgba(0,0,0,0.2); }
</style>
</head>
<body>

<!-- MAP -->
<div id="map"></div>

<!-- TOP BAR -->
<header id="topbar">
  <button id="back-btn" onclick="goBack()">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <div id="wordmark">Iskr<em>o</em>po</div>
</header>

<!-- SHEET -->
<div id="sheet">
  <div class="handle"></div>
  <div id="scroll">

    <p id="hl-main">I'm on it.</p>
    <p id="hl-sub">Let me read your request...</p>

    <!-- Query typewriter -->
    <div id="query-wrap">
      <div id="query-display">
        <!-- sparkle icon inline SVG -->
        <svg viewBox="0 0 24 24" fill="none" style="width:18px;height:18px;flex-shrink:0;margin-top:2px;">
          <path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6z" fill="#F77622"/>
        </svg>
        <span id="typewriter-text"><span class="cursor"></span></span>
      </div>
    </div>

    <!-- Parse label -->
    <p class="section-label" id="lbl-parse">Parsing your request</p>

    <!-- Chips -->
    <div id="chips">
      <div class="chip chip-svc" id="c-svc">
        <svg id="c-svc-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3h18v4l-9 5-9-5V3z"/><path d="M3 7v12a2 2 0 002 2h14a2 2 0 002-2V7"/></svg>
        <span id="c-svc-txt">Laundry</span>
      </div>
      <div class="chip chip-other" id="c-when">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <span id="c-when-txt">Tomorrow</span>
      </div>
      <div class="chip chip-other" id="c-budget">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9 9h1a3 3 0 110 6H9v-6z"/><line x1="9" y1="12" x2="15" y2="12"/></svg>
        <span id="c-budget-txt">R100</span>
      </div>
      <div class="chip chip-other" id="c-loc">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 1118 0z"/><circle cx="12" cy="10" r="3"/></svg>
        <span id="c-loc-txt">Sunnyside</span>
      </div>
    </div>

    <!-- Refine -->
    <p class="section-label" id="lbl-refine" style="margin-top:22px;">Refine your search</p>
    <div id="refine-wrap">
      <button class="refine-row" onclick="go()">
        <div class="refine-icon">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/></svg>
        </div>
        <div class="refine-body"><strong>Use my current location</strong><span>Pinpoint exactly where you are</span></div>
        <svg class="refine-chevron" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
      <button class="refine-row" onclick="sessionStorage.setItem('iskropo_when','This morning'); go()">
        <div class="refine-icon">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="2" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="2" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="22" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        </div>
        <div class="refine-body"><strong>Schedule for morning</strong><span>Starts between 8:00 AM – 10:00 AM</span></div>
        <svg class="refine-chevron" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
      <button class="refine-row" onclick="go()">
        <div class="refine-icon">
          <svg viewBox="0 0 24 24" fill="#F77622"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
        </div>
        <div class="refine-body"><strong>Match me automatically</strong><span>Instant booking with a top-rated pro</span></div>
        <svg class="refine-chevron" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>

    <!-- Loading bar -->
    <div id="loading-wrap">
      <div id="bar-track"><div id="bar-fill"></div></div>
      <div id="bar-text">
        <svg viewBox="0 0 24 24" fill="none" id="bar-icon" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <span id="bar-msg">Finding nearby providers...</span>
      </div>
    </div>

  </div><!-- /scroll -->

  <div id="actions">
    <button id="btn-continue" onclick="go()">Continue →</button>
    <button id="btn-browse"   onclick="go()">Browse manually</button>
  </div>
</div>

<!-- Leaflet JS — defer so sheet renders first -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" defer></script>

<script>
// ── Data from previous screen ──────────────────────────────
const query  = sessionStorage.getItem('iskropo_query')    || 'Laundry tomorrow under R100';
const svcIn  = sessionStorage.getItem('iskropo_service')  || null;
const whenIn = sessionStorage.getItem('iskropo_when')     || null;
const budIn  = sessionStorage.getItem('iskropo_budget')   || null;
const locIn  = sessionStorage.getItem('iskropo_location') || null;

// ── Parse ─────────────────────────────────────────────────
function parse(q) {
  const ql = q.toLowerCase();
  let svc = 'General Help', when = 'ASAP', budget = 'Flexible', loc = 'Sunnyside';
  if      (ql.match(/laundry|wash/))          svc = 'Laundry';
  else if (ql.match(/hair|cut|barber/))        svc = 'Haircut';
  else if (ql.match(/clean/))                  svc = 'Cleaning';
  else if (ql.match(/fix|repair|handyman|plumb/)) svc = 'Handyman';
  else if (ql.match(/cook|meal|food/))         svc = 'Cooking';
  else if (ql.match(/garden|lawn|mow/))        svc = 'Gardening';

  if      (ql.includes('tomorrow'))            when = 'Tomorrow';
  else if (ql.match(/today|now|urgent/))       when = 'Today';
  else if (ql.includes('morning'))             when = 'This morning';
  else if (ql.includes('weekend'))             when = 'Weekend';

  const bm = ql.match(/r\s*(\d+)/i);
  if (bm) budget = 'R' + bm[1];

  return { svc, when, budget, loc };
}

const p   = parse(query);
const svc    = svcIn  || p.svc;
const when   = whenIn || p.when;
const budget = budIn  || p.budget;
const loc    = locIn  || p.loc;

// Populate chip labels immediately (before animation)
document.getElementById('c-svc-txt').textContent    = svc;
document.getElementById('c-when-txt').textContent   = when;
document.getElementById('c-budget-txt').textContent = budget;
document.getElementById('c-loc-txt').textContent    = loc;

// ── Navigation ────────────────────────────────────────────
function go() {
  if (advTimer) clearTimeout(advTimer);
  sessionStorage.setItem('iskropo_service',  svc);
  sessionStorage.setItem('iskropo_when',     when);
  sessionStorage.setItem('iskropo_budget',   budget);
  sessionStorage.setItem('iskropo_location', loc);
  window.location.href = '/providers';
}
function goBack() {
  if (history.length > 1) history.back();
  else window.location.href = '/';
}

// ── Typewriter ────────────────────────────────────────────
function typewrite(text, el, onDone) {
  let i = 0;
  const speed = Math.max(22, Math.min(45, 600 / text.length));
  // keep cursor at end
  const cursorSpan = el.querySelector('.cursor') || (() => {
    const s = document.createElement('span');
    s.className = 'cursor'; el.appendChild(s); return s;
  })();
  function tick() {
    if (i < text.length) {
      cursorSpan.insertAdjacentText('beforebegin', text[i++]);
      setTimeout(tick, speed);
    } else {
      setTimeout(() => cursorSpan.style.display = 'none', 400);
      if (onDone) onDone();
    }
  }
  tick();
}

// ── Map (init after Leaflet loads) ───────────────────────
const CENTER = [-25.7479, 28.2293];
const offsets = [
  [ 0.0018,  0.0032], [-0.0025,  0.0015],
  [ 0.0010, -0.0028], [-0.0015, -0.0020],
  [ 0.0030, -0.0008], [-0.0008,  0.0040],
];
let map;

function initMap() {
  if (typeof L === 'undefined') return; // Leaflet not loaded yet, skip
  map = L.map('map', { center: CENTER, zoom: 15, zoomControl: false, attributionControl: false, dragging: false, scrollWheelZoom: false });
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);
  const uIcon = L.divIcon({ className:'', html:'<div class="u-wrap"><div class="u-ring"></div><div class="u-dot"></div></div>', iconSize:[44,44], iconAnchor:[22,22] });
  L.marker(CENTER, { icon: uIcon, interactive: false }).addTo(map);
}

function addMapDot(idx) {
  if (!map || idx >= offsets.length) return;
  const pos = [CENTER[0] + offsets[idx][0], CENTER[1] + offsets[idx][1]];
  const icon = L.divIcon({ className:'', html:'<div class="p-dot"></div>', iconSize:[9,9], iconAnchor:[4.5,4.5] });
  L.marker(pos, { icon, interactive: false }).addTo(map);
}

// ── Sequence ─────────────────────────────────────────────
let advTimer;

function run() {
  // 300ms: show query box + typewrite
  setTimeout(() => {
    const wrap = document.getElementById('query-wrap');
    wrap.classList.add('show');
    typewrite(query, document.getElementById('typewriter-text'), null);
  }, 300);

  // 1000ms: parse label
  setTimeout(() => {
    document.getElementById('lbl-parse').classList.add('show');
    document.getElementById('hl-sub').textContent = 'Parsing your request...';
  }, 1000);

  // chips stagger
  [['c-svc',1200], ['c-when',1500], ['c-budget',1800], ['c-loc',2100]].forEach(([id,t],i) => {
    setTimeout(() => {
      document.getElementById(id).classList.add('show');
      addMapDot(i);
    }, t);
  });
  setTimeout(() => addMapDot(4), 2250);
  setTimeout(() => addMapDot(5), 2400);

  // 2400ms: refine + loading
  setTimeout(() => {
    document.getElementById('lbl-refine').classList.add('show');
    document.getElementById('refine-wrap').classList.add('show');
    document.getElementById('loading-wrap').classList.add('show');
    document.getElementById('bar-fill').classList.add('shimmer');
    document.getElementById('hl-sub').textContent = 'Finding nearby providers...';
  }, 2400);

  // 3600ms: found
  setTimeout(() => {
    const fill = document.getElementById('bar-fill');
    fill.classList.remove('shimmer');
    fill.style.width = '100%';

    const bt = document.getElementById('bar-text');
    bt.classList.add('found');
    document.getElementById('bar-icon').innerHTML = '<polyline points="20 6 9 17 4 12"/>';
    document.getElementById('bar-icon').setAttribute('stroke','#2e7d52');
    document.getElementById('bar-msg').textContent = 'Found 6 providers nearby ✓';
    document.getElementById('hl-sub').textContent = 'Ready when you are.';
  }, 3600);

  // 4100ms: button pulses
  setTimeout(() => {
    document.getElementById('btn-continue').classList.add('glow');
  }, 4100);

  // 5500ms: auto-advance
  advTimer = setTimeout(go, 5500);
}

// ── Boot ─────────────────────────────────────────────────
// DOMContentLoaded fires as soon as HTML is parsed — doesn't wait for CDN scripts
document.addEventListener('DOMContentLoaded', () => {
  // Start the UI sequence immediately
  run();
  // Init map separately — it'll render when Leaflet finishes loading
  if (document.readyState === 'complete') {
    initMap();
  } else {
    window.addEventListener('load', initMap);
  }
});
</script>
</body>
</html>
